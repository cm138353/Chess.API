services:
  api-web:
    image: chess/api-web:latest
    container_name: api-web
    build:
      context: ../../../
      dockerfile: angular/Dockerfile.local      
    ports:
      - "4200:80"
    depends_on:
      - api-api
    volumes:
      - ./dynamic-env.json://usr/share/nginx/html/dynamic-env.json
    networks:
      - abp-network  

  api-api:
    image: chess/api-api:latest
    container_name: api-api-container
    build:
      context: ../../
      dockerfile: Chess.API/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=91f91912-5ab0-49df-8166-23377efaf3cc
      - App__SelfUrl=https://localhost:44322
      - App__HealthCheckUrl=http://api:8080/health-status
      - AuthServer__Authority=http://api-api:8080
      - AuthServer__RequireHttpsMetadata=false
      - AuthServer__SetSelfAsIssuer=true 
      - ConnectionStrings__Default=User ID=postgres;Password=myPassw0rd;Host=postgres;Port=5432;Database=API;Pooling=false;
    ports:
      - "44322:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure    
    volumes:
      - ./certs:/app/certs
    networks:
      - abp-network  
  
  db-migrator:
    image: chess/api-api:latest
    container_name: db-migrator
    build:
      context: ../../
      dockerfile: Chess.API/Dockerfile.local
    environment:
      - ConnectionStrings__Default=User ID=postgres;Password=myPassw0rd;Host=postgres;Port=5432;Database=API;Pooling=false;
    command:
      - --migrate-database
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - abp-network
  postgres:
    container_name: postgres-db
    image: postgres:14.1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "myPassw0rd"
    volumes:
      - postgres_data:/var/opt/postgres
    networks:
      - abp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
    name: api_postgres_data
networks:
  abp-network:
    name: api-network
    driver: bridge